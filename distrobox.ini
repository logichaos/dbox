[system]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

pre_init_hooks=dnf -y copr enable dejan/lazygit; dnf -y copr enable tofik/nwg-shell; dnf -y copr enable lihaohong/yazi

additional_packages="neovim lazygit yazi nwg-displays rust cargo btop atop"

init_hooks=CARGO_INSTALL_ROOT=/usr/local cargo install --locked --bin jj jj-cli; bash -c "$(curl -sLo- https://superfile.dev/install.sh)"; bash /run/host/var/home/zephy/setup/dbox/scripts/install-lazyjournal.sh

exported_bins="/usr/bin/nvim /usr/bin/lazygit /usr/local/bin/jj /usr/bin/yazi /usr/local/bin/spf /usr/bin/btop /usr/bin/atop /usr/local/bin/lazyjournal"
exported_bins_path=~/.local/bin
exported_apps="nwg-displays"

[dev]
image=quay.io/fedora/fedora-toolbox:43
pull=true
replace=true
start_now=true

additional_packages="dotnet-sdk-10.0 golang npm python3 python3-pip pipx typescript"

init_hooks=curl -sSL https://dot.net/v1/dotnet-install.sh | bash /dev/stdin --channel 11.0 --quality preview --install-dir /usr/share/dotnet; dotnet workload install aspire; npm install -g azure-functions-core-tools@4; PIPX_HOME=/opt/pipx PIPX_BIN_DIR=/usr/local/bin pipx install posting

exported_bins="/usr/local/bin/posting"
exported_bins_path=~/.local/bin
